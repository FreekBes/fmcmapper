# Serving config baked into the fmcmapper-viewer image. This file is dropped into
# /etc/nginx/conf.d/, which the stock image includes inside its http{} block
# (after `include mime.types`), so the directives outside the server{} block here
# are http-context additions, not replacements.

# mime.types has no entry for .geojson; add one (this adds to the inherited map,
# it does not replace it) so the biome polygons get a JSON content type and the
# gzip rule below can match them.
types {
    application/geo+json  geojson;
}

# Biome polygons and metadata are JSON/GeoJSON text — they compress ~5-10x.
gzip            on;
gzip_vary       on;
gzip_comp_level 5;
gzip_min_length 512;
gzip_types      application/json application/geo+json;

# WebSocket upgrade plumbing for the player-tracking proxy below.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen       80;
    server_name  localhost;
    root         /usr/share/nginx/html;
    index        index.html;

    # Reverse-proxy the player-tracking WebSocket so the whole map (tiles + live
    # players) needs only this one port open. Using a variable + resolver defers
    # the DNS lookup to request time, so nginx still starts when the tracker
    # isn't running (RCON unset) — those requests just fail and the map shows no
    # players. 127.0.0.11 is Docker's embedded DNS; fmcmapper is the renderer
    # service (which hosts the tracker on port 8082).
    location /players {
        resolver 127.0.0.11 valid=10s;
        set $upstream fmcmapper:8082;
        proxy_pass http://$upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 1h; # keep idle player sockets alive
    }

    # The whole output (tiles, biome GeoJSON, meta.json, index.html) is rewritten
    # in place on every incremental render. "no-cache" lets the browser keep a
    # copy but revalidate via ETag / Last-Modified before reuse: an unchanged file
    # costs a tiny 304, a changed one is re-fetched. ETag and conditional requests
    # are on by default in nginx, so there is nothing else to configure.
    location / {
        add_header Cache-Control "no-cache";
    }
}
