services:
  fmcmapper:
    build: .
    container_name: fmcmapper
    restart: "no"
    volumes:
      - ./world:/app/world
      - ./output:/app/output

  server:
    image: nginx:alpine
    container_name: fmcmapper-server
    restart: "unless-stopped"
    ports:
      - "8080:80"
    volumes:
      - ./output:/usr/share/nginx/html:ro
    depends_on:
      fmcmapper:
        condition: service_completed_successfully
