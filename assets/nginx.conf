# nginx server block for serving an fmcmapper output directory.
# Mount over the image's default config:
#   ./assets/nginx.conf:/etc/nginx/conf.d/default.conf:ro
#
# The whole map output (tiles, biome GeoJSON, meta.json, index.html) is rewritten
# in place on every incremental render, so the served files keep changing under
# the same URLs. "no-cache" lets the browser keep a copy but forces it to
# revalidate via ETag / Last-Modified before reuse: an unchanged tile costs a
# tiny 304, a changed one is re-fetched (200). ETag and conditional requests are
# on by default in nginx, so there is nothing else to configure.
server {
    listen       80;
    server_name  localhost;
    root         /usr/share/nginx/html;
    index        index.html;

    location / {
        add_header Cache-Control "no-cache";
    }
}
