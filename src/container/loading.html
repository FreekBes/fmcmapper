<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<!-- Auto-reload until the renderer replaces this page with the real map viewer. -->
<meta http-equiv="refresh" content="10" />
<title>Rendering map…</title>
<style>
  @font-face {
    font-family: 'Monocraft';
    src: url('https://cdn.jsdelivr.net/gh/IdreesInc/Monocraft@main/dist/Monocraft-ttf/Monocraft.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
  }
  html, body { height: 100%; margin: 0; }
  body {
    display: flex; align-items: center; justify-content: center;
    background: #0b0b0b; color: #eee; text-align: center; padding: 24px;
    font-family: 'Monocraft', monospace;
  }
  .box { max-width: 30rem; }
  h1 { font-size: 1.3rem; font-weight: normal; margin: 0 0 .7rem; }
  p { opacity: .7; font-size: .95rem; line-height: 1.6; margin: 0; }
  .dots::after { content: ''; animation: dots 1.5s steps(4, end) infinite; }
  @keyframes dots { 0% { content: ''; } 25% { content: '.'; } 50% { content: '..'; } 75% { content: '...'; } }
</style>
</head>
<body>
  <div class="box">
    <h1>Rendering the map<span class="dots"></span></h1>
    <p>fmcmapper is still generating the map from your world. This page refreshes
       automatically — the viewer will appear here shortly.</p>
  </div>
</body>
</html>
