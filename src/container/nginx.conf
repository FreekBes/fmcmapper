# nginx serving config for the fmcmapper image. nginx runs alongside the renderer
# in the same container and serves its output directory (/app/output). Dropped at
# /etc/nginx/conf.d/default.conf, which the stock nginx.conf includes inside its
# http{} block (after `include mime.types`), so the directives outside server{}
# here are http-context additions, not replacements.

# mime.types has no entry for .geojson; add one (this adds to the inherited map,
# it does not replace it) so the biome polygons get a JSON content type and the
# gzip rule below can match them.
types {
    application/geo+json  geojson;
}

# WebSocket upgrade plumbing for the player-tracking proxy below.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen       80;
    server_name  localhost;
    root         /app/output; # the renderer's OUTPUT_PATH
    index        index.html;

    # Biome polygons and metadata are JSON/GeoJSON text — they compress ~5-10x.
    # Set here (server scope) rather than http scope: the base image's nginx.conf
    # already enables gzip globally, and a second `gzip on` in the same http
    # context is a duplicate-directive error.
    gzip            on;
    gzip_vary       on;
    gzip_comp_level 5;
    gzip_min_length 512;
    gzip_types      application/json application/geo+json;

    # Reverse-proxy the player-tracking WebSocket so the whole map (tiles + live
    # players) needs only this one port. The tracker runs in this same container
    # on 127.0.0.1:8082; when RCON isn't configured nothing listens there and
    # these requests just fail — the map simply shows no players.
    location /players {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 1h; # keep idle player sockets alive
    }

    # The whole output (tiles, biome GeoJSON, meta.json, index.html) is rewritten
    # in place on every incremental render. "no-cache" lets the browser keep a
    # copy but revalidate via ETag / Last-Modified before reuse: an unchanged file
    # costs a tiny 304, a changed one is re-fetched. ETag and conditional requests
    # are on by default in nginx, so there is nothing else to configure.
    location / {
        add_header Cache-Control "no-cache";
    }
}
