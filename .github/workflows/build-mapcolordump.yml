name: Build map-color-dump image

# Builds and pushes the MapColorDumpMod image. Only runs when the mod's folder
# changes — otherwise it's skipped entirely.
on:
  push:
    branches: [master]
    paths:
      - 'MapColorDumpMod/**'
      - '.github/workflows/build-mapcolordump.yml'
  workflow_dispatch:

concurrency:
  group: build-mapcolordump-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Tag after the Minecraft version the mod targets (minecraft_version in
      # gradle.properties). Two tags per build:
      #   :<mcver>              moving — pull_policy: always picks up new builds
      #   :<mcver>-<run_number> immutable — distinct per build, for rollback
      - name: Resolve image and tags
        id: meta
        run: |
          ver="$(grep -oP '^minecraft_version=\K.*' MapColorDumpMod/gradle.properties | tr -d '[:space:]')"
          [ -n "$ver" ] || { echo "could not read minecraft_version from gradle.properties" >&2; exit 1; }
          image="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/mapcolor-dump"
          echo "Building $image for Minecraft $ver (build $GITHUB_RUN_NUMBER)"
          {
            echo "tags<<EOF"
            echo "${image}:latest"
            echo "${image}:${ver}"
            echo "${image}:${ver}-${GITHUB_RUN_NUMBER}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./MapColorDumpMod
          file: ./MapColorDumpMod/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
