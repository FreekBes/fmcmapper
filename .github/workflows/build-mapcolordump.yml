name: Build map-color-dump image

# Builds and pushes the MapColorDumpMod image. Only runs when the mod's folder
# changes — otherwise it's skipped entirely.
on:
  push:
    branches: [master]
    paths:
      - 'MapColorDumpMod/**'
      - '.github/workflows/build-mapcolordump.yml'
  workflow_dispatch:

concurrency:
  group: build-mapcolordump-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The mod targets a specific Minecraft version (minecraft_version in
      # gradle.properties); the image is tagged after it. GHCR image names must be
      # lowercase, so build the image reference here.
      - name: Resolve version and image
        id: ver
        run: |
          ver="$(grep -oP '^minecraft_version=\K.*' MapColorDumpMod/gradle.properties | tr -d '[:space:]')"
          [ -n "$ver" ] || { echo "could not read minecraft_version from gradle.properties" >&2; exit 1; }
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/mapcolor-dump" >> "$GITHUB_OUTPUT"

      # Single source for OCI labels AND annotations. created / revision / licenses
      # are filled in automatically; we override title / description / source /
      # version. Annotations are emitted at the image index level, where GHCR reads
      # the package description.
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: index
        with:
          images: ${{ steps.ver.outputs.image }}
          flavor: latest=false
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.ver.outputs.version }}
            type=raw,value=${{ steps.ver.outputs.version }}-${{ github.run_number }}
          labels: |
            org.opencontainers.image.title=fmcmapper map-color-dump
            org.opencontainers.image.description=Modded Minecraft server that dumps Minecraft's vanilla map + biome colours to JSON for the fmcmapper project and then exits. Docs: github.com/FreekBes/fmcmapper/tree/master/MapColorDumpMod
            org.opencontainers.image.source=https://github.com/FreekBes/fmcmapper/tree/master/MapColorDumpMod
            org.opencontainers.image.version=${{ steps.ver.outputs.version }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./MapColorDumpMod
          file: ./MapColorDumpMod/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          # Distinct cache scope per image — the default scope is shared, so two
          # images building concurrently would clobber each other's GHA cache.
          cache-from: type=gha,scope=mapcolor-dump
          cache-to: type=gha,scope=mapcolor-dump,mode=max
