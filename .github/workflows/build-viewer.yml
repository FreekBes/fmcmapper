name: Build viewer image

# Builds and pushes the viewer image (nginx + serving config). It serves whatever
# render output is mounted into it, so it's independent of the Minecraft version —
# unlike the renderer, it's tagged only :latest and an immutable build number.
on:
  push:
    branches: [master]
    paths:
      - 'viewer/**'
      - '.github/workflows/build-viewer.yml'
  workflow_dispatch:

concurrency:
  group: build-viewer-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Two tags per build:
      #   :latest             moving — compose pins this with pull_policy: always
      #   :<run_number>       immutable — distinct per build, for rollback
      - name: Resolve image and tags
        id: meta
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/fmcmapper-viewer"
          echo "Building $image (build $GITHUB_RUN_NUMBER)"
          {
            echo "tags<<EOF"
            echo "${image}:latest"
            echo "${image}:${GITHUB_RUN_NUMBER}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./viewer
          file: ./viewer/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
