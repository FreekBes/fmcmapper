name: Build fmcmapper image

# Builds and pushes the tiling service image (root Dockerfile). Runs only when
# files that affect it change — mod-only changes are handled by the separate
# build-mapcolordump workflow.
on:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'assets/**'
      - 'Dockerfile'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - '.github/workflows/build-fmcmapper.yml'
  workflow_dispatch:

concurrency:
  group: build-fmcmapper-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The renderer targets a specific Minecraft version (TARGET_VERSION in
      # buildtiles.ts); the image is tagged after it. GHCR image names must be
      # lowercase, so build the image reference here.
      - name: Resolve version and image
        id: ver
        run: |
          ver="$(grep -oP "TARGET_VERSION = '\K[^']+" src/buildtiles.ts)"
          [ -n "$ver" ] || { echo "could not read TARGET_VERSION from src/buildtiles.ts" >&2; exit 1; }
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/fmcmapper" >> "$GITHUB_OUTPUT"

      # Single source for OCI labels AND annotations. created / revision / source /
      # licenses are filled in automatically; we override title / description /
      # version. Tags: moving :latest and :<mcver>, plus an immutable
      # :<mcver>-<run_number> for rollback. Annotations are emitted at the image
      # index level, which is where GHCR reads the package description.
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        env:
          DOCKER_METADATA_ANNOTATIONS_LEVELS: index
        with:
          images: ${{ steps.ver.outputs.image }}
          flavor: latest=false
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.ver.outputs.version }}
            type=raw,value=${{ steps.ver.outputs.version }}-${{ github.run_number }}
          labels: |
            org.opencontainers.image.title=fmcmapper
            org.opencontainers.image.description=Renders a Minecraft world into an in-game-map-styled web map and serves it over HTTP (built-in nginx). Docs: github.com/FreekBes/fmcmapper
            org.opencontainers.image.version=${{ steps.ver.outputs.version }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          # Distinct cache scope per image — the default scope is shared, so two
          # images building concurrently would clobber each other's GHA cache.
          cache-from: type=gha,scope=fmcmapper
          cache-to: type=gha,scope=fmcmapper,mode=max
