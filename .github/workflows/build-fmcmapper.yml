name: Build fmcmapper image

# Builds and pushes the tiling service image (root Dockerfile). Runs only when
# files that affect it change — mod-only changes are handled by the separate
# build-mapcolordump workflow.
on:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'assets/**'
      - 'Dockerfile'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - '.github/workflows/build-fmcmapper.yml'
  workflow_dispatch:

concurrency:
  group: build-fmcmapper-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Tag after the Minecraft version this renderer targets (TARGET_VERSION in
      # buildtiles.ts). Two tags per build:
      #   :<mcver>              moving — compose pins this with pull_policy: always
      #   :<mcver>-<run_number> immutable — distinct per build, for rollback
      - name: Resolve image and tags
        id: meta
        run: |
          ver="$(grep -oP "TARGET_VERSION = '\K[^']+" src/buildtiles.ts)"
          [ -n "$ver" ] || { echo "could not read TARGET_VERSION from src/buildtiles.ts" >&2; exit 1; }
          image="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/fmcmapper"
          echo "Building $image for Minecraft $ver (build $GITHUB_RUN_NUMBER)"
          {
            echo "tags<<EOF"
            echo "${image}:latest"
            echo "${image}:${ver}"
            echo "${image}:${ver}-${GITHUB_RUN_NUMBER}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
